name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev patchelf

      - name: Install deps
        run: pnpm install

      - name: TypeScript check
        run: pnpm tsc -b

      - name: Frontend build
        run: pnpm build

      - name: Rust check
        working-directory: ./src-tauri
        run: cargo check

      - name: Rust clippy
        working-directory: ./src-tauri
        run: cargo clippy --no-deps -- -D warnings
        continue-on-error: true
