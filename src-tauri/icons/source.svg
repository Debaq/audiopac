<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2436"/>
      <stop offset="50%" stop-color="#6B1F2E"/>
      <stop offset="100%" stop-color="#4A1620"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background with rounded corners (iOS-style squircle) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#shine)"/>

  <!-- Concentric wave rings (subtle, representing sound propagation) -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="3">
    <circle cx="512" cy="512" r="360"/>
    <circle cx="512" cy="512" r="280"/>
    <circle cx="512" cy="512" r="200"/>
  </g>

  <!-- Central audio waveform icon -->
  <g stroke="url(#accent)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Wave bars of varying heights -->
    <line x1="300" y1="512" x2="300" y2="512" stroke-width="56"/>
    <line x1="400" y1="380" x2="400" y2="644" stroke-width="56"/>
    <line x1="500" y1="280" x2="500" y2="744" stroke-width="56"/>
    <line x1="600" y1="380" x2="600" y2="644" stroke-width="56"/>
    <line x1="700" y1="450" x2="700" y2="574" stroke-width="56"/>
  </g>

  <!-- Small accent dot (branding) -->
  <circle cx="780" cy="260" r="24" fill="#DDB967"/>
</svg>
